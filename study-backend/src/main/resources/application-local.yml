spring:
  datasource:
    url: jdbc:mysql://localhost:3306/studyapp?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:f34949a5f6fd7988369bda46068d0f91}
    client-secret: ${KAKAO_CLIENT_SECRET:Kh6hZqCA0wuSmBPIdvvLv4cQhK25n7Yx}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

app:
  frontend-redirect-uri: ${FRONTEND_REDIRECT_URI:studyapp://auth/callback}
